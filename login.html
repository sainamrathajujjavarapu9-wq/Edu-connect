<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduAccess Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#1565c0,#42a5f5);

}

.login-box{

width:420px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.3);

}

h1{

text-align:center;
margin-bottom:25px;
color:#1565c0;

}

label{

display:block;
margin-top:15px;
font-weight:bold;

}

input,select{

width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;

}

button{

width:100%;
margin-top:25px;
padding:14px;
border:none;
background:#1565c0;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;

}

button:hover{

background:#0d47a1;

}

.language{

margin-top:20px;
text-align:center;

}

.language button{

width:auto;
padding:10px 20px;
margin:5px;

}

.error{

margin-top:15px;
color:red;
text-align:center;

}

</style>

</head>

<body>

<div class="login-box">

<h1 id="title">

EduAccess Login

</h1>

<label id="roleLabel">

Login As

</label>

<select id="role">

<option value="student">

Student

</option>

<option value="teacher">

Teacher

</option>

</select>

<label id="nameLabel">

Full Name

</label>

<input
type="text"
id="name"
placeholder="Enter your full name">

<label id="idLabel">

Student / Teacher ID

</label>

<input
type="text"
id="userId"
placeholder="Enter ID">

<button onclick="login()"
id="loginBtn">

Login

</button>

<div class="language">

<button onclick="changeLanguage('en')">

English

</button>

<button onclick="changeLanguage('pa')">

ਪੰਜਾਬੀ

</button>

</div>

<p class="error" id="error"></p>

</div>

<script>

function login(){

const role=document.getElementById("role").value;

const name=document.getElementById("name").value.trim();

const id=document.getElementById("userId").value.trim();

if(name===""||id===""){

document.getElementById("error").innerHTML=
"Please fill all fields.";

return;

}

const user={

role:role,
name:name,
id:id

};

localStorage.setItem(
"loggedInUser",
JSON.stringify(user)
);

if(role==="student"){

window.location.href="studentdashboard.html";

}
else{

window.location.href="teacher dashbord.html";

}

}

function changeLanguage(lang){

if(lang==="pa"){

document.getElementById("title").innerHTML=
"ਐਡਯੂਐਕਸੈੱਸ ਲਾਗਇਨ";

document.getElementById("roleLabel").innerHTML=
"ਲਾਗਇਨ ਕਰੋ";

document.getElementById("nameLabel").innerHTML=
"ਪੂਰਾ ਨਾਮ";

document.getElementById("idLabel").innerHTML=
"ਆਈਡੀ";

document.getElementById("loginBtn").innerHTML=
"ਲਾਗਇਨ";

document.getElementById("name").placeholder=
"ਆਪਣਾ ਨਾਮ ਦਰਜ ਕਰੋ";

document.getElementById("userId").placeholder=
"ਆਪਣੀ ਆਈਡੀ ਦਰਜ ਕਰੋ";

}
else{

document.getElementById("title").innerHTML=
"EduAccess Login";

document.getElementById("roleLabel").innerHTML=
"Login As";

document.getElementById("nameLabel").innerHTML=
"Full Name";

document.getElementById("idLabel").innerHTML=
"Student / Teacher ID";

document.getElementById("loginBtn").innerHTML=
"Login";

document.getElementById("name").placeholder=
"Enter your full name";

document.getElementById("userId").placeholder=
"Enter ID";

}

}

</script>

</body>
</html>
